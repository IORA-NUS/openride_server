version: '3.7'
services:
    mongodb:
        image: mongo:6.0
        ports:
            - "27017:27017"
        volumes:
            - mongo_data:/data/db
        stop_grace_period: 30s
        ulimits:
            nofile:
                soft: 65535
                hard: 65535

    api:
        build: openroad_platform
        environment:
            - MONGODB_HOST=mongodb
            # Cap PyMongo pool per gunicorn worker to avoid exhausting MongoDB fds under load
            - MONGO_MAX_POOL_SIZE=25
        ulimits:
            nofile:
                soft: 65535
                hard: 65535
        depends_on:
            - mongodb
        networks:
            - kafka_bridge
            - default

    analytics:
        build: openroad_analytics
        ports:
            - 11655:11655
        environment:
            - MONGODB_HOST=mongodb
        ulimits:
            nofile:
                soft: 65535
                hard: 65535
        depends_on:
            - mongodb
        networks:
            - kafka_bridge
            - default
    nginx:
        container_name: nginx
        build: nginx
        ports:
            - 11654:11654
        ulimits:
            nofile:
                soft: 65535
                hard: 65535
        depends_on:
            - api
        networks:
            - kafka_bridge
            - default

    
    osrm-extract:
        image: osrm/osrm-backend
        volumes:
            - type: bind
              source: /home/user/openride_server/maps
              target: /data
        command: osrm-extract -p /opt/car.lua /data/malaysia-singapore-brunei-260305.osm.pbf
        tty: true
        profiles: [osrm-preprocess]

    osrm-partition:
        image: osrm/osrm-backend
        volumes:
            - type: bind
              source: /home/user/openride_server/maps
              target: /data
        command: osrm-partition /data/malaysia-singapore-brunei-260305.osrm
        tty: true
        profiles: [osrm-preprocess]

    osrm-customize:
        image: osrm/osrm-backend
        volumes:
            - type: bind
              source: /home/user/openride_server/maps
              target: /data
        command: osrm-customize /data/malaysia-singapore-brunei-260305.osrm
        profiles: [osrm-preprocess]
        tty: true

    osrm-routed:
        image: osrm/osrm-backend
        volumes:
            - type: bind
              source: /home/user/openride_server/maps
              target: /data
        command: osrm-routed --algorithm mld /data/malaysia-singapore-brunei-260305.osrm
        ports:
            - 10001:5000

volumes:
    mongo_data:
    kafka_data:

networks:
    kafka_bridge:
        external: true
        name: kafka-server-bridge