version: '3.7'
services:
    mongodb:
        image: mongo:6.0
        ports:
            - "27017:27017"
        volumes:
            - mongo_data:/data/db
        stop_grace_period: 30s

    api:
        build: openroad_platform
        environment:
            - MONGODB_HOST=mongodb
        depends_on:
            - mongodb

    analytics:
        build: openroad_analytics
        ports:
            - 11655:11655
        environment:
            - MONGODB_HOST=mongodb
        depends_on:
            - mongodb

    nginx:
        container_name: nginx
        build: nginx
        ports:
            - 11654:11654
        depends_on:
            - api
    
    osrm-extract:
        image: osrm/osrm-backend
        volumes:
            - type: bind
              source: /home/user/openride_server/maps
              target: /data
        command: osrm-extract -p /opt/car.lua /data/malaysia-singapore-brunei-260305.osm.pbf
        tty: true
        profiles: [osrm-preprocess]

    osrm-partition:
        image: osrm/osrm-backend
        volumes:
            - type: bind
              source: /home/user/openride_server/maps
              target: /data
        command: osrm-partition /data/malaysia-singapore-brunei-260305.osrm
        tty: true
        profiles: [osrm-preprocess]

    osrm-customize:
        image: osrm/osrm-backend
        volumes:
            - type: bind
              source: /home/user/openride_server/maps
              target: /data
        command: osrm-customize /data/malaysia-singapore-brunei-260305.osrm
        profiles: [osrm-preprocess]
        tty: true

    osrm-routed:
        image: osrm/osrm-backend
        volumes:
            - type: bind
              source: /home/user/openride_server/maps
              target: /data
        command: osrm-routed --algorithm mld /data/malaysia-singapore-brunei-260305.osrm
        ports:
            - 10001:5000

volumes:
    mongo_data: